<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UserForm1</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: #eef1f8;
    min-height: 100%;
  }

  .titlebar {
    background: #f0f0f0;
    border-bottom: 1px solid #ccc;
    font-size: 12px;
    color: #333;
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .titlebar .close { cursor: pointer; color: #333; padding: 0 6px; }

  .form-window {
    background: #eef1f8;
    padding: 20px 30px 40px 30px;
    min-height: 700px;
  }

  .header-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    border: 1px solid #b9c2d6;
    background: #f3f6fb;
    padding: 10px;
  }
  .header-title {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 400;
    color: #111;
    font-family: Georgia, "Times New Roman", serif;
  }
  .anil-badge {
    border: 1px solid #333;
    background: #f3f6fb;
    padding: 8px 18px;
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }

  hr.divider { border: none; border-top: 2px solid #999; margin: 14px 0 22px 0; }

  .file-picker-row { display: flex; margin-bottom: 20px; }
  .file-picker-label {
    background: #fff; border: 1px solid #333; padding: 12px 18px;
    font-size: 18px; white-space: nowrap; cursor: pointer;
  }
  .file-picker-input { flex: 1; border: 1px solid #333; border-left: none; padding: 0; }
  .file-picker-input input[type="text"] {
    width: 100%; height: 100%; border: none; padding: 10px 12px;
    font-size: 16px; background: #fff;
  }
  .file-picker-hidden { display: none; }

  .status-bar {
    min-height: 22px;
    margin-bottom: 20px;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 3px;
  }
  .status-bar.info { color: #333; }
  .status-bar.working { background: #fff6d6; color: #7a5b00; border: 1px solid #e0c56b; }
  .status-bar.success { background: #e4f7e4; color: #1e5c1e; border: 1px solid #9bd89b; }
  .status-bar.error { background: #fbe4e4; color: #8a1f1f; border: 1px solid #e79c9c; }

  .modules-row { display: flex; gap: 20px; align-items: flex-start; }
  .module-col { flex: 1; min-width: 0; }

  .module-header {
    background: #dfe4ee; border: 1px solid #333; padding: 12px 8px;
    text-align: center; font-size: 20px; color: #111; margin-bottom: 10px;
  }

  .payroll-row { display: flex; gap: 6px; margin-bottom: 8px; }

  .report-btn {
    background: #e9e9e9; border: 1px solid #333; padding: 12px 10px;
    text-align: left; font-size: 16px; color: #111; cursor: pointer;
    width: 100%; display: block; margin-bottom: 8px; font-family: inherit;
  }
  .report-btn:hover { background: #d8d8d8; }
  .report-btn:active { background: #c5c5c5; }
  .report-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .pdf-btn { width: 70px; flex-shrink: 0; text-align: center; margin-bottom: 8px; }
  .coming-soon { color: #555; font-style: italic; }

  hr.footer-divider { border: none; border-top: 2px solid #999; margin: 30px 0 20px 0; }

  .exit-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .exit-btn { background: #e9e9e9; border: 1px solid #333; padding: 20px 60px; font-size: 22px; cursor: pointer; }
  .exit-btn:hover { background: #d8d8d8; }
</style>
</head>
<body>

  <div class="titlebar">
    <span>UserForm1</span>
    <span class="close">✕</span>
  </div>

  <div class="form-window">

    <div class="header-row">
      <div class="header-title">Welcom to Excel to XLPivot &amp; Reporting System</div>
      <div class="anil-badge" id="userBadge">ANIL</div>
    </div>

    <hr class="divider">

    <div class="file-picker-row">
      <div class="file-picker-label" onclick="document.getElementById('fileInput').click()">
        Pick Your file from File source
      </div>
      <div class="file-picker-input">
        <input type="text" id="filePathDisplay" readonly>
      </div>
      <input type="file" id="fileInput" class="file-picker-hidden" accept=".xlsx,.xls,.csv" onchange="handleFileSelect(event)">
      <input type="file" id="file2Input" class="file-picker-hidden" accept=".xlsx,.xls,.csv">
    </div>

    <div class="status-bar info" id="statusBar"></div>

    <div class="modules-row">

      <div class="module-col">
        <div class="module-header">Payroll Reports</div>
        <div class="payroll-row">
          <button class="report-btn" style="flex:1;" onclick="runReport('salary_pivot_bu_wise', this)">1. Salary Pivot BU Wise</button>
          <button class="report-btn pdf-btn" onclick="runReport('salary_pivot_bu_wise_pdf', this)">PDF</button>
        </div>
        <button class="report-btn" onclick="runReport('gross_salary_comparision', this)">2. Gross Salary Comparision (A-B)</button>
        <button class="report-btn" onclick="runReport('net_salary_comparision', this)">3. Net Salary Comparision (A-B)</button>
      </div>

      <div class="module-col">
        <div class="module-header">Statutory Reports</div>
        <button class="report-btn" onclick="runReport('tds_section_wise', this)">1. TDS Section wise</button>
        <button class="report-btn" onclick="runReport('tds_pivot_bu_wise', this)">2. TDS Pivot BU Wise</button>
        <button class="report-btn" onclick="runReport('gst_pivot_summary', this)">3. GST Pivot Summary</button>
      </div>

      <div class="module-col">
        <div class="module-header">Sales Module Report</div>
        <button class="report-btn" onclick="runReport('amount_received', this)">1. Amount Received</button>
      </div>

      <div class="module-col">
        <div class="module-header">Finance Module Report</div>
        <button class="report-btn" onclick="runReport('daybook_difference', this)">1. Diffrence of Day Book A-B</button>
        <button class="report-btn" onclick="runReport('creditor_outstanding', this)">2. Creditor Outstanding Report</button>
      </div>

      <div class="module-col">
        <div class="module-header">Purchase Module</div>
        <button class="report-btn coming-soon" disabled>1. Coming Soon</button>
      </div>

    </div>

    <hr class="footer-divider">

    <div class="exit-wrap">
      <button class="exit-btn" onclick="handleExit()">Exit</button>
    </div>

  </div>

  <script>
    // Relative path -- works whether this page is served locally or from
    // your live website, since the API lives on the same server as this page.
    const API_BASE = "";

    let selectedFile = null;

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        selectedFile = file;
        document.getElementById('filePathDisplay').value = file.name;
        setStatus('', 'info');
      }
    }

    function setStatus(message, kind) {
      const bar = document.getElementById('statusBar');
      bar.textContent = message;
      bar.className = 'status-bar ' + kind;
    }

    // Reports that need TWO files (like your VBA macros that pick File 1
    // then File 2 and compare them).
    const TWO_FILE_REPORTS = new Set([
      'gross_salary_comparision',
      'net_salary_comparision',
      'daybook_difference'
    ]);

    function pickSecondFile() {
      return new Promise((resolve) => {
        const input = document.getElementById('file2Input');
        input.value = ''; // reset so re-picking the same file still fires 'change'
        const handler = (e) => {
          input.removeEventListener('change', handler);
          resolve(e.target.files[0] || null);
        };
        input.addEventListener('change', handler);
        input.click();
      });
    }

    async function runReport(reportId, buttonEl) {
      if (!selectedFile) {
        setStatus('Please pick a source file first.', 'error');
        return;
      }

      let secondFile = null;
      if (TWO_FILE_REPORTS.has(reportId)) {
        setStatus('This report compares two files. Please choose the SECOND file now...', 'working');
        secondFile = await pickSecondFile();
        if (!secondFile) {
          setStatus('No second file selected. Report cancelled.', 'error');
          return;
        }
      }

      const allButtons = document.querySelectorAll('.report-btn');
      allButtons.forEach(b => b.disabled = true);
      setStatus('Running "' + reportId + '"...', 'working');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('report_id', reportId);
        if (secondFile) {
          formData.append('file2', secondFile);
        }

        const response = await fetch(API_BASE + '/api/run-report', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(errText || ('Server returned ' + response.status));
        }

        // Backend can return either:
        // 1) a file (e.g. the generated Excel/PDF) -> we download it, or
        // 2) JSON with a status message.
        const contentType = response.headers.get('Content-Type') || '';

        if (contentType.includes('application/json')) {
          const data = await response.json();
          setStatus(data.message || 'Done.', 'success');
        } else {
          const blob = await response.blob();
          const disposition = response.headers.get('Content-Disposition') || '';
          const match = disposition.match(/filename="?([^"]+)"?/);
          const filename = match ? match[1] : (reportId + '_output');

          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);

          setStatus('Report generated: ' + filename, 'success');
        }
      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      } finally {
        allButtons.forEach(b => b.disabled = false);
      }
    }

    function handleExit() {
      if (confirm('Are you sure you want to exit?')) {
        window.location.href = 'login_form.html';
      }
    }
  </script>

</body>
</html>
