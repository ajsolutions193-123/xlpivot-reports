<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Now</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
  }

  .titlebar {
    background: #f0f0f0;
    border-bottom: 1px solid #ccc;
    font-size: 12px;
    color: #333;
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .titlebar .close {
    cursor: pointer;
    color: #333;
    padding: 0 6px;
  }

  .form-window {
    background-color: #8f9a86;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.08), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px);
    min-height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    position: relative;
  }

  .banner {
    width: 90%;
    max-width: 900px;
    border: 1px solid rgba(0,0,0,0.3);
    background: rgba(0,0,0,0.05);
    padding: 20px 20px 0 20px;
    text-align: center;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.15);
  }

  .title-main {
    font-size: 42px;
    font-weight: bold;
    color: #f5f0d0;
    text-shadow: 2px 2px 3px rgba(0,0,0,0.5);
    letter-spacing: 1px;
    margin: 10px 0 20px 0;
    font-family: Georgia, "Times New Roman", serif;
  }

  .subtitle-box {
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.3);
    margin: 0 30px;
    padding: 12px 0;
  }

  .subtitle {
    font-size: 34px;
    color: #f5f5f0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: 1px;
  }

  .divider-row {
    width: 90%;
    max-width: 900px;
    display: flex;
    align-items: center;
    margin: 6px 0 40px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(0,0,0,0.35);
  }
  .divider-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #d99a3d;
    margin: 0 6px;
  }

  .login-panel {
    border: 1px solid #444;
    width: 340px;
  }

  .login-row {
    display: flex;
  }
  .login-label {
    width: 140px;
    background: #b9b9b9;
    border: 1px solid #444;
    border-top: none;
    padding: 10px 12px;
    font-size: 16px;
    color: #111;
  }
  .login-row:first-child .login-label {
    border-top: 1px solid #444;
  }
  .login-input {
    flex: 1;
    border: 1px solid #444;
    border-top: none;
    border-left: none;
    padding: 0;
  }
  .login-row:first-child .login-input {
    border-top: 1px solid #444;
  }
  .login-input input {
    width: 100%;
    height: 100%;
    border: none;
    padding: 10px 12px;
    font-size: 16px;
    background: #fff;
  }
  .login-input input:focus {
    outline: 2px solid #6a8fbf;
    outline-offset: -2px;
  }

  .login-button {
    background: #b9b9b9;
    border: 1px solid #444;
    border-top: 2px solid #ddd;
    border-bottom: 3px solid #222;
    padding: 14px 0;
    text-align: center;
    font-size: 18px;
    color: #111;
    cursor: pointer;
    user-select: none;
  }
  .login-button:active {
    border-top: 2px solid #222;
    border-bottom: 3px solid #ddd;
  }
</style>
</head>
<body>

  <div class="titlebar">
    <span>Login Now</span>
    <span class="close">✕</span>
  </div>

  <div class="form-window">
    <div class="banner">
      <div class="title-main">Excel To Excel/PDF</div>
      <div class="subtitle-box">
        <div class="subtitle">SoftTec Techno Solutions</div>
      </div>
    </div>

    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <form class="login-panel" onsubmit="return handleLogin(event)">
      <div class="login-row">
        <div class="login-label">User Name</div>
        <div class="login-input"><input type="text" id="username" autocomplete="username"></div>
      </div>
      <div class="login-row">
        <div class="login-label">Password</div>
        <div class="login-input"><input type="password" id="password" autocomplete="current-password"></div>
      </div>
      <button type="submit" class="login-button">Login Now</button>
    </form>
  </div>

  <script>
    // ---- Set your allowed login(s) here ----
    // Add as many username/password pairs as you need.
    const VALID_USERS = [
      { username: "anil", password: "1234" }
    ];

    // ---- Which page to open after a successful login ----
    const NEXT_PAGE = "dashboard.html";

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();

      if (user === '' || pass === '') {
        alert('Please enter both User Name and Password.');
        return false;
      }

      const match = VALID_USERS.find(
        u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass
      );

      if (match) {
        // Success -> go to the next page, just like the VBA form
        // would close and open the next UserForm.
        window.location.href = NEXT_PAGE;
      } else {
        alert('Invalid User Name or Password.');
      }

      return false;
    }
  </script>

</body>
</html>
